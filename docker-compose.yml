version: '3.8'

services:

  mysql:
    image: mysql:8
    container_name: mysqldb1
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: mercdb
      MYSQL_ROOT_HOST: '%'
    ports:
      - "3307:3306"
    volumes:
      - mysqldata:/var/lib/mysql

  springboot:
    build: .
    container_name: springboot-app1
    depends_on:
      - mysql
    ports:
      - "8080:8080"

volumes:
  mysqldata: